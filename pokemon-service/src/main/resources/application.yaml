spring:
  application:
    name: pokemon-service
  datasource:
    url: jdbc:postgresql://localhost:5432/berijalanbootcamp
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082
  servlet:
    context-path: /pokemon-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/