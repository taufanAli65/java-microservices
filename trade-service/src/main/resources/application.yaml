spring:
  application:
    name: trade-service
  datasource:
    url: jdbc:postgresql://localhost:5432/berijalanbootcamp
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

kafka:
  bootstrap-servers: localhost:9092

server:
  port: 8084
  servlet:
    context-path: /trade-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
